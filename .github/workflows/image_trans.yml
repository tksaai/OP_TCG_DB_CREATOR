name: GDrive Image Converter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow gdown

      - name: Download Images from Google Drive
        env:
          # ▼ 新しくSecretsに登録するJSONのファイルID
          JSON_FILE_ID: "1XuSQYYy8RVLhh98x6kFNg_0oWJ0peySV"
          # （※もしこれもSecrets登録が面倒であれば、直書きで JSON_FILE_ID: "ファイルIDの文字列" としても動きます）
        run: |
          gdown "$JSON_FILE_ID" -O ./file_list.json
          mkdir -p ./processed_images
          
          python process_images.py \
            --json "./file_list.json" \
            --output "./processed_images" \
            --exclude "_small"


      - name: Push Images to External Repository
        env:
          # ▼ 送り先リポジトリ情報はここに直書き（scraperと同じ方式）
          TARGET_REPO: "tksaai/OP_TCG_DB"
          TARGET_BRANCH: "main"
          # ▼ トークンのみ、既存の共通Secretsを呼び出す
          API_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # トークンを使ってクローン
          git clone https://x-access-token:$API_TOKEN@github.com/$TARGET_REPO.git target_repo
          
          # ▼ 出力先リポジトリの Cards フォルダに画像をコピー
          mkdir -p target_repo/Cards
          cp -r processed_images/* target_repo/Cards/ || echo "No images to copy"
          
          cd target_repo
          # ▼ Cards フォルダをコミット対象に追加
          git add Cards/
          
          if git diff --staged --quiet; then
            echo "No new images to commit."
          else
            git commit -m "Auto: Added new images from Google Drive"
            git push origin $TARGET_BRANCH
            echo "Successfully pushed images to $TARGET_REPO"
          fi
