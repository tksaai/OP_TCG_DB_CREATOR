name: GDrive Image Converter

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow gdown

      - name: Sync Images and Push to External Repository
        env:
          JSON_FILE_ID: "1XuSQYYy8RVLhh98x6kFNg_0oWJ0peySV"
          TARGET_REPO: "tksaai/OP_TCG_DB"
          TARGET_BRANCH: "main"
          API_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          # 1. GASが作ったリストをダウンロード
          gdown "$JSON_FILE_ID" -O ./file_list.json
          
          # 2. 先にターゲットリポジトリをクローンする（過去の画像を持ってくる）
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://x-access-token:$API_TOKEN@github.com/$TARGET_REPO.git target_repo
          
          # Cardsフォルダを準備
          mkdir -p target_repo/Cards
          
          # 3. クローンした Cards フォルダを「出力先」としてPythonを実行
          # （これで、すでにCards内にある画像はGoogleにアクセスせずスキップされます）
          python process_images.py \
            --json "./file_list.json" \
            --output "./target_repo/Cards" \
            --exclude "_small"
            
          # 4. コミットとプッシュ
          cd target_repo
          git add Cards/
          
          if git diff --staged --quiet; then
            echo "No new images to commit."
          else
            git commit -m "Auto: Added new images from Google Drive"
            git push origin $TARGET_BRANCH
            echo "Successfully pushed images to $TARGET_REPO"
          fi
